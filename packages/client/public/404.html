<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect: encodes the path into the query string
      // so the main index.html can restore it via history.replaceState.
      const path = location.pathname.replace(/^\/[^/]*/, "") + location.search;
      location.replace(location.origin + location.pathname.replace(/\/[^/]*$/, "") + "/?p=" + encodeURIComponent(path) + "#" + location.hash.slice(1));
    </script>
  </head>
</html>
